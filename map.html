<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map - Caucasian Trail</title>
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <script src="assets/js/translations.js"></script>
</head>
<body>
    <div class="lang-switcher">
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">RU</button>
    </div>

    <nav class="map-nav">
        <a href="index.html" class="back-link" data-i18n="back-link">← Back to Home</a>
        <h1 data-i18n="map-title">Interactive Trail Map</h1>
    </nav>

    <div id="map"></div>

    <div class="map-legend">
        <div class="legend-header">
            <h3 data-i18n="legend-title">Legend</h3>
            <button class="legend-toggle" onclick="toggleLegend()">−</button>
        </div>
        <div class="legend-content">
        <div class="legend-item">
            <span class="legend-line"></span>
            <span data-i18n="legend-track">Hiking Track</span>
        </div>
        <div class="legend-section">
            <strong data-i18n="legend-accommodations">Daily Accommodations:</strong>
        </div>
        <div class="legend-item">
            <span class="legend-marker">⛺</span>
            <span data-i18n="legend-tent">Tent</span>
        </div>
        <div class="legend-item">
            <span class="legend-marker">🏕️</span>
            <span data-i18n="legend-glamping">Glamping</span>
        </div>
        <div class="legend-item">
            <span class="legend-marker">🏠</span>
            <span data-i18n="legend-guesthouse">Guest House</span>
        </div>
        <div class="legend-item">
            <span class="legend-marker">🏨</span>
            <span data-i18n="legend-hotel">Hotel</span>
        </div>
        <div class="legend-section">
            <strong data-i18n="legend-poi">Points of Interest:</strong>
        </div>
        <div class="legend-item">
            <span class="legend-marker">⛰️</span>
            <span data-i18n="legend-passes">Passes</span>
        </div>
        <div class="legend-item">
            <span class="legend-marker">🌊</span>
            <span data-i18n="legend-rivers">River Crossings</span>
        </div>
        <div class="legend-item">
            <span class="legend-marker">⚠️</span>
            <span data-i18n="legend-danger">Danger Zones</span>
        </div>
        <div class="legend-item">
            <span class="legend-marker">🚧</span>
            <span data-i18n="legend-checkpoints">Checkpoints</span>
        </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
