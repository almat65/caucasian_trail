services:
  - type: worker
    name: caucasian-trail-bot
    runtime: python
    rootDir: telegram_bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: BOT_PASSWORD
        sync: false
    # Worker-specific settings
    plan: starter  # or your plan type
